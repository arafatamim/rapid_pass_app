name: rapid_pass_info
description: "Displays all your Rapid Passes in one place."
publish_to: "none"

version: 1.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  html: ^0.15.6
  http: ^1.4.0
  relative_time: ^5.0.0
  dynamic_color: ^1.7.0
  flutter_flip_card: ^0.0.6
  animated_reorderable_list: ^1.3.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  path: ^1.9.1
  reorderable_grid: ^1.0.10
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.1
  upgrader: ^11.4.0
  version: ^3.0.2
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.2
  dropdown_search: ^6.0.2
  collection: ^1.19.1
  sliver_tools: ^0.2.12
  side_sheet: ^1.0.4
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.5
  grouped_list: ^6.0.0
  material_loading_indicator:
    git: git@github.com:ksokolovskyi/material_loading_indicator.git
  shared_preferences: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.5.4
  hive_ce_generator: ^1.9.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
  fonts:
    - family: Lexend Deca
      fonts:
        - asset: assets/fonts/LexendDeca/LexendDeca-VariableFont_wght.ttf
